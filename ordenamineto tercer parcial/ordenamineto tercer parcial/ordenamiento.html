<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Visualizador QuickSort</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background-color: #f4f7f6;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            color: #333;
        }

        .container {
            background: #ffffff;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 8px 24px rgba(0, 0, 0, 0.1);
            width: 100%;
            max-width: 450px;
            text-align: center;
        }

        h1 {
            color: #2c3e50;
            margin-bottom: 10px;
            font-size: 24px;
        }

        p {
            color: #7f8c8d;
            font-size: 14px;
            margin-bottom: 20px;
        }

        input[type="text"] {
            width: 100%;
            padding: 12px;
            border: 2px solid #bdc3c7;
            border-radius: 8px;
            font-size: 16px;
            margin-bottom: 15px;
            outline: none;
            transition: border-color 0.3s;
        }

        input[type="text"]:focus {
            border-color: #3498db;
        }

        button {
            width: 100%;
            background-color: #3498db;
            color: white;
            border: none;
            padding: 12px;
            font-size: 16px;
            font-weight: bold;
            border-radius: 8px;
            cursor: pointer;
            transition: background-color 0.3s;
        }

        button:hover {
            background-color: #2980b9;
        }

        .results {
            margin-top: 25px;
            text-align: left;
            border-top: 1px solid #ecf0f1;
            padding-top: 15px;
        }

        h3 {
            font-size: 15px;
            font-weight: 600;
            margin-bottom: 8px;
            color: #34495e;
        }

        span {
            font-weight: normal;
            color: #16a085;
        }
    </style>
</head>
<body>

<div class="container">
    <h1>QuickSort</h1>
    <p>Ingrese números separados por comas</p>

    <input type="text" id="datos" placeholder="Ej. 50, 20, 80, 10, 60">
    <button onclick="ordenar()">Ordenar</button>

    <div class="results">
        <h3 id="original">Original: <span>-</span></h3>
        <h3 id="resultado">Ordenado: <span>-</span></h3>
    </div>
</div>

<script>
function quickSort(arr) {
    if (arr.length <= 1) return arr;

    let pivote = arr[arr.length - 1];
    let izquierda = [];
    let derecha = [];

    for (let i = 0; i < arr.length - 1; i++) {
        if (arr[i] < pivote) {
            izquierda.push(arr[i]);
        } else {
            derecha.push(arr[i]);
        }
    }

    return [...quickSort(izquierda), pivote, ...quickSort(derecha)];
}

function ordenar() {
    let inputVal = document.getElementById("datos").value.trim();
    
    if (!inputVal) return;

    let datos = inputVal.split(",").map(Number);
    let ordenado = quickSort([...datos]);

    document.getElementById("original").innerHTML = "Original: <span>" + datos.join(", ") + "</span>";
    document.getElementById("resultado").innerHTML = "Ordenado: <span>" + ordenado.join(", ") + "</span>";
}
</script>

</body>
</html>
